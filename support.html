<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>Support - ER Taxi Quiz</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --surface: #ffffff;
      --text: #172033;
      --muted: #5b6477;
      --line: #d9deea;
      --brand: #0f5bd6;
      --brand-soft: #eaf1ff;
      --shadow: 0 12px 30px rgba(23, 32, 51, 0.08);
      --radius: 20px;
    }


    * {
      box-sizing: border-box;
    }


    html {
      -webkit-text-size-adjust: 100%;
    }


    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(15, 91, 214, 0.10), transparent 36%),
        radial-gradient(circle at top right, rgba(23, 32, 51, 0.06), transparent 30%),
        var(--bg);
      color: var(--text);
