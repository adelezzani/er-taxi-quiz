<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>Privacy Policy - ER Taxi Quiz</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --surface: #ffffff;
      --text: #172033;
      --muted: #5b6477;
      --line: #d9deea;
      --brand: #0f5bd6;
      --brand-soft: #eaf1ff;
      --shadow: 0 12px 30px rgba(23, 32, 51, 0.08);
      --radius: 20px;
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at top left, rgba(15, 91, 214, 0.10), transparent 36%), radial-gradient(circle at top right, rgba(23, 32, 51, 0.06), transparent 30%), var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .page { max-width: 920px; margin: 0 auto; padding: 24px 16px 40px; }
    .hero { background: linear-gradient(180deg, #ffffff 0%, #f9fbff 100%); border: 1px solid var(--line); border-radius: 28px; box-shadow: var(--shadow); padding: 28px 22px; margin-bottom: 18px; }
    .eyebrow { display: inline-block; font-size: 0.82rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--brand); background: var(--brand-soft); padding: 8px 12px; border-radius: 999px; margin-bottom: 14px; }
    h1 { margin: 0 0 10px; font-size: clamp(2rem, 4vw, 3rem); line-height: 1.1; letter-spacing: -0.03em; }
    .subtitle { margin: 0; color: var(--muted); font-size: 1.02rem; max-width: 68ch; }
    .meta { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 18px; }
    .chip { display: inline-flex; align-items: center; border: 1px solid var(--line); background: #fff; color: var(--muted); border-radius: 999px; padding: 8px 12px; font-size: 0.92rem; }
    .content { display: grid; gap: 16px; }
    .card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); padding: 22px; }
    h2 { margin: 0 0 12px; font-size: 1.25rem; line-height: 1.25; letter-spacing: -0.02em; }
    p { margin: 0 0 12px; color: var(--text); }
    p:last-child { margin-bottom: 0; }
    ul { margin: 0; padding-left: 20px; color: var(--text); }
    li + li { margin-top: 8px; }
    .contact-box, .footer-box { background: linear-gradient(180deg, #f6f9ff 0%, #ffffff 100%); border: 1px solid var(--line); border-radius: 18px; padding: 16px; }
    a { color: var(--brand); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .footer { margin-top: 18px; text-align: center; color: var(--muted); font-size: 0.92rem; }
    @media (min-width: 720px) { .page { padding: 36px 24px 52px; } .hero { padding: 36px 34px; } .card { padding: 26px 28px; } }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero" aria-labelledby="policy-title">
      <div class="eyebrow">ER Taxi Quiz</div>
      <h1 id="policy-title">Privacy Policy</h1>
      <p class="subtitle">Last updated: June 2026</p>
      <div class="meta" aria-label="Policy summary">
        <span class="chip">App name: ER Taxi Quiz</span>
        <span class="chip">No account required</span>
        <span class="chip">Offline audio included</span>
      </div>
    </section>
